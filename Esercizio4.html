<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <title>Esercizio 4 - Form di Contatto</title>
  </head>
  <body>
    <h1>Inserire i dati per l'accesso &#128514;</h1>
    <form action="#">
      <label for="name">Inserire nome</label><br />
      <input type="text" placeholder="Marco" id="name" /> <br />
      <label for="email">Inserire email</label> <br />
      <input type="email" placeholder="marcorossi@gmail.com" id="email" />
      <br />
      <label for="password">Inserire password</label> <br />
      <input type="password" placeholder="password" id="password" /> <br />
      <br />
      <input type="submit" /> <br />
    </form>
  </body>
</html>
