<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esercizio 3 — Border & Shadow</title>
    <style>
        h1 {border: 3px solid blue;
            box-shadow: inset 3px 3px 30px 0px;
            background-color: azure;
        }
    </style>
</head>
<body>
    <h1>Esercizio 3 — Border & Shadow</h1>
    <p>Aggiungete bordi colorati ai vostri elementi e create un elegante effetto
 "sollevato" usando la proprietà box- shadow. Provate diversi valori di blur e offset.</p>
</body>
</html>
