<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Esercizio 3 - Link e Immagine</title>
</head>
<body>
    <h1>Link e Immagine in HTML</h1>
    
    <h2>Link</h2>
    <!-- il tag <a> viene utilizzato per creare un collegamento ipertestuale -->
    <a href="https://www.example.com">
    <h2>Immagine</h2>
    <!-- il tag <img> viene utilizzato per inserire un'immagine, con l'attributo src che specifica il percorso dell'immagine, alt che fornisce un testo alternativo e title che fornisce un titolo all'immagine. -->
    <img src="Immagini/images.jpg" alt="Immagine di esempio" title="esempio">
    </a>
</body>
</html>
