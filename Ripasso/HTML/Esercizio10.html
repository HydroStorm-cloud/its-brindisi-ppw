<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esercizio 10 - Pagina Responsive</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Esempio di media query per dispositivi con larghezza massima di 600px */
    
   body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    header, main, footer {
      padding: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <h1>Benvenuti nella mia pagina responsive</h1>
  </header>
  <main>
    <p>Questa pagina è progettata per essere visualizzata correttamente su dispositivi di diverse dimensioni, grazie all'uso di media query nel file CSS.</p>
    <img src="Immagini/responsive.jpg" alt="Esempio di design responsive" title="Design Responsive">
  </main>
  <footer>
    <p>© 2025 - Tutti i diritti riservati</p>
  </footer>
</body>
</html>
