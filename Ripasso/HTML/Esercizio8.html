<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Esercizio 8 - Contenuti Multimediali</title>
</head>
<body>
    <h1>Contenuti Multimediali in HTML</h1>
    <!-- Il tag <video> viene utilizzato per inserire un video, con l'attributo controls che aggiunge i controlli di riproduzione. Il tag <audio> viene utilizzato per inserire un audio, con l'attributo controls che aggiunge i controlli di riproduzione. -->
    <h2>Video</h2>
    <video width="320" height="240" controls>
      <source src="video.mp4">
    </video>
    
    <h2>Audio</h2>
    <audio controls>
      <source src="audio.mp3" >
    </audio>
</body>
</html>
