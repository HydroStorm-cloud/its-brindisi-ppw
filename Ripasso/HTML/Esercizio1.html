<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Esercizio 1 - Titolo e Paragrafo</title>
</head>
<body>
  <!-- il tag <h1> viene utilizzato per creare un titolo di primo livello, mentre il tag <p> viene utilizzato per creare un paragrafo di testo. -->
  <h1>Titolo dell'Pagina</h1>
  <p>Questo è un paragrafo di testo.</p>
</body>
</html>
