<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Esercizio 5 - Tabella</title>
</head>
<body>
    <h1>Tabella in HTML</h1>
    <!-- il tag <table> viene utilizzato per creare una tabella, con l'attributo border che specifica lo spessore del bordo della tabella. Il tag <thead> viene utilizzato per definire l'intestazione della tabella, mentre il tag <tbody> viene utilizzato per definire il corpo della tabella. Il tag <tr> viene utilizzato per creare una riga della tabella, mentre il tag <th> viene utilizzato per creare una cella di intestazione e il tag <td> viene utilizzato per creare una cella di dati. -->
    <table border="1">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Cognome</th>
                <th>Età</th>
            </tr>
        </thead>
        <tbody>
        <tr>
            <td>Mario</td>
            <td>Rossi</td>
            <td>30</td>
        </tr>
        </tbody>
        <tbody></tbody>
        <tr>
            <td>Luigi</td>
            <td>Bianchi</td>
            <td>25</td>
        </tr>
        </tbody>
        <tbody>
        <tr>
            <td>Giulia</td>
            <td>Verdi</td>
            <td>28</td>
        </tr>
        </tbody>
    </table>
</body>
</html>
