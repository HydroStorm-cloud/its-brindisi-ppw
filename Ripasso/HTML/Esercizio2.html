<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Esercizio 2 - Liste</title>
</head>
<body>
    <h1>Liste in HTML</h1>
    
    <h2>Lista Ordinata</h2>
    <!-- il tag <ol> viene utilizzato per creare una lista ordinata -->
    <ol>
        <!-- il tag <li> viene utilizzato per creare un elemento della lista-->
        <li>Primo elemento</li>
        <li>Secondo elemento</li>
        <li>Terzo elemento</li>
    </ol>
    
    <h2>Lista Non Ordinata</h2>
    <!-- il tag <ul> viene utilizzato per creare una lista non ordinata -->
    <ul>
        <!-- il tag <li> viene utilizzato per creare un elemento della lista-->
        <li>Elemento A</li>
        <li>Elemento B</li>
        <li>Elemento C</li>
    </ul>
</body>
</html>
