<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Esercizio 4 - Transizioni CSS</title>
  <style>
    div {
        background-color: red;
      transition: background-color 0.5s ease;
      transition: color 0.5s ease;
    }
    div:hover {
      background-color: rgb(175, 27, 131);
      color: yellow;
    }
  </style>
</head>
<body>
  <div>
   <h1>Transizione di Colore</h1> Passa il mouse su questo box per vedere la transizione del colore.
  </div>
</body>
</html>
