<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Esercizio 4 - Transizioni CSS</title>
  <!-- Il tag <style> viene utilizzato per definire lo stile CSS all'interno del documento HTML. In questo caso, viene applicato uno stile al div, con l'attributo background-color che specifica il colore di sfondo e l'attributo transition che specifica la durata e il tipo di transizione per il cambiamento di colore. L'effetto hover viene utilizzato per modificare il colore di sfondo e il colore del testo quando si passa il mouse sul div. -->
  <style>
    div {
        background-color: red;
      transition: background-color 0.5s ease, color 0.5s ease;
    }
    div:hover {
      background-color: rgb(175, 27, 131);
      color: yellow;
    }
  </style>
</head>
<body>
  <div>
   <h1>Transizione di Colore</h1> Passa il mouse su questo box per vedere la transizione del colore.
  </div>
</body>
</html>
