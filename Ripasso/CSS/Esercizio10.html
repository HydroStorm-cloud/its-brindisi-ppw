<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Esercizio 10 - Animazioni CSS</title>
  <!-- Il tag <style> viene utilizzato per definire lo stile CSS all'interno del documento HTML. In questo caso, viene definita un'animazione chiamata "fadeIn" che cambia l'opacità da 0 a 1. La classe "anim-box" applica questa animazione a un div, con una durata di 2 secondi, un effetto di easing e un ciclo infinito in alternanza. -->
  <style>
    @keyframes fadeIn { from
        { opacity: 0; } to
        { opacity: 1; } }
    .anim-box {
      animation: fadeIn 2s ease-in-out infinite alternate;
    }
  </style>
</head>
<body>
  <div class="anim-box" style="width: 150px; height: 150px; background-color: salmon;">
    Animazione in corso
  </div>
</body>
</html>
