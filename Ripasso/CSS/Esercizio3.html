<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Esercizio 3 - Bordo e Ombra</title>
  <!-- Il tag <style> viene utilizzato per definire lo stile CSS all'interno del documento HTML. In questo caso, viene applicato uno stile al div, con l'attributo border che specifica il bordo, box-shadow che specifica l'ombra, padding che specifica i margini interni e margin che specifica i margini esterni. -->
  <style>
    div {
      border: 2px solid black;
      box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.5);
      padding: 20px;
      margin: 20px;
    }
  </style>
</head>
<body>
  <div>
    <p>Guarda questo box con bordo e ombra.</p>
  </div>
</body>
</html>
