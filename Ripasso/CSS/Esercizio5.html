<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Esercizio 5 - Pseudo-classi</title>
  <!-- Il tag <style> viene utilizzato per definire lo stile CSS all'interno del documento HTML. In questo caso, vengono applicati stili ai link, con le pseudo-classi :hover e :active che specificano gli stili da applicare quando un link viene passato con il mouse o attivato. -->
  <style>
    a {
      color: rgb(89, 14, 211);
      text-decoration: double;
      font-size: 20px;
    }
    a:hover {
      color: red;
      text-decoration: underline;
    }
    a:active {
      color: green;
      text-decoration: overline;
    }
  </style>
</head>
<body>
  <a href="#">Interagisci con me</a>
</body>
</html>
