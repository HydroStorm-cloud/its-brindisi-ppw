<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Esercizio 5 - Pseudo-classi</title>
  <style>
    a {
      color: rgb(89, 14, 211);
      text-decoration: double;
      font-size: 20px;
    }
    a:hover {
      color: red;
      text-decoration: underline;
    }
    a:active {
      color: green;
      text-decoration: overline;
    }
  </style>
</head>
<body>
  <a href="#">Interagisci con me</a>
</body>
</html>
