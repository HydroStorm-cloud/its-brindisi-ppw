<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Esercizio 6 - Flexbox</title>
  <style>
    .flex-container {
      display: flex;
      justify-content: space-around;
      align-items: center;
      height: 200px;
      background-color: lightgray;
    }
    .flex-container div {
      background-color: rgb(89, 14, 211);
      color: white;
      padding: 20px;
      font-size: 18px;
    }
    .element{
      transition: background-color 2s ease, color 0.7s ease;
    
    }
    .element:hover {
      background-color: rgb(175, 27, 131);
      color: yellow;
    }
  </style>
</head>
<body>
  <div class="flex-container">
    <div class="element">Elemento 1</div>
    <div class="element">Elemento 2</div>
    <div class="element">Elemento 3</div>
  </div>
</body>
</html>
