<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Esercizio 9 - Media Queries</title>
  <style>
    .responsive {
      background-color: lightblue;
      padding: 20px;
      text-align: center;
    }
    @media (max-width: 600px) {
      .responsive {
        background-color: lightcoral;
        color: white;
      }
    }
  </style>
</head>
<body>
  <div class="responsive">
    <p>Questo elemento cambierà stile su schermi piccoli.</p>
  </div>
</body>
</html>
