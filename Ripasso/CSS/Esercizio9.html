<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Esercizio 9 - Media Queries</title>
  <!-- Il tag <style> viene utilizzato per definire lo stile CSS all'interno del documento HTML. In questo caso, viene applicato uno stile a un div con la classe "responsive". La regola @media viene utilizzata per applicare stili specifici quando la larghezza dello schermo è inferiore a 600 pixel, modificando il colore di sfondo e il colore del testo del div. -->
  <style>
    .responsive {
      background-color: lightblue;
      padding: 20px;
      text-align: center;
    }
    @media (max-width: 600px) {
      .responsive {
        background-color: lightcoral;
        color: white;
      }
    }
  </style>
</head>
<body>
  <div class="responsive">
    <p>Questo elemento cambierà stile su schermi piccoli.</p>
  </div>
</body>
</html>
