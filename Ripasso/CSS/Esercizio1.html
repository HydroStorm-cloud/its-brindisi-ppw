<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Esercizio 1 - Colori</title>
    <!-- Il tag <style> viene utilizzato per definire lo stile CSS all'interno del documento HTML. In questo caso, viene modificato il colore di sfondo del corpo della pagina e il colore del testo. -->
  <style>
    body {
      background-color: lightblue;
      color: darkblue;
    }
  </style>
  <!-- body con l'uso della parentesi graffa viene definito lo stile per il corpo della pagina, con l'attributo background-color che specifica il colore di sfondo e l'attributo color che specifica il colore del testo. -->
</head>
<body>
  <h1>Ciao CSS3!</h1>
  <p>Modifica i colori di sfondo e del testo.</p>
</body>
</html>
