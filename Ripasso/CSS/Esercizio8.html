<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Esercizio 8 - Tipografia</title>
    <!-- Il tag <link> viene utilizzato per collegare un foglio di stile esterno, in questo caso un font da Google Fonts. Il tag <style> viene utilizzato per definire lo stile CSS all'interno del documento HTML. In questo caso, viene applicato uno stile al corpo della pagina, con l'attributo font-family che specifica il font da utilizzare, line-height che specifica l'altezza della linea e color che specifica il colore del testo. Inoltre, vengono applicati stili ai titoli e ai paragrafi, con font-size che specifica la dimensione del font e font-weight che specifica lo spessore del font. -->
  <link href="https://fonts.googleapis.com/
css2?family=Roboto&display=swap"
rel="stylesheet">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      line-height: 1.6;
      color: rgb(5, 0, 14);
    }
    h1 {
      font-size: 36px;
      font-weight: bold;
    }
    p {
      font-size: 18px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <h1>Titolo Principale</h1>
  <p>Questo paragrafo usa stili di font personalizzati.</p>
</body>
</html>
