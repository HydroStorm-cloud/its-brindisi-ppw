<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Esercizio 2 - Margini e Padding</title>
  <!-- Il tag <style> viene utilizzato per definire lo stile CSS all'interno del documento HTML. In questo caso, viene applicato uno stile al div, con l'attributo margin che specifica i margini esterni e l'attributo padding che specifica i margini interni. -->
  <style>
    div {
      margin: 20px;
      padding: 10px;
      border: 1px solid black;
    }
  </style>
</head>
<body>
  <div>
    <p>Questo paragrafo ha margini e padding personalizzati.</p>
  </div>
</body>
</html>
