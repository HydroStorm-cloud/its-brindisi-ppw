<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Esercizio 4 - Layout Responsive</title>
</head>
<body>
  <!-- si definisce un layout responsive utilizzando il sistema di griglia di Bootstrap. Il contenuto è organizzato in un container che contiene una riga (row) con tre colonne (col-md-4). Ogni colonna contiene del testo che indica la sua posizione (Colonna 1, Colonna 2, Colonna 3). Alla fine del corpo della pagina, viene incluso uno script per caricare il file JavaScript di Bootstrap, necessario per far funzionare correttamente i componenti interattivi di Bootstrap. -->
  <div class="container">
    <div class="row">
      <div class="col-md-4">Colonna 1</div>
      <div class="col-md-4">Colonna 2</div>
      <div class="col-md-4">Colonna 3</div>
    </div>
  </div>
      <script src("https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js")></script>
</body>
</html>
