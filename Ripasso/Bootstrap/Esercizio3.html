<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Esercizio 3 - Form di Registrazione</title>
</head>
<!-- si definisce un container Bootstrap che contiene una riga con una colonna centrata (col-md-6 mx-auto) che ospita un modulo di registrazione. Il modulo include campi per nome, cognome, email e password, ognuno con una label e un input di tipo appropriato. Alla fine del modulo, c'è un pulsante di invio con la classe btn btn-primary. Infine, viene incluso uno script per caricare il file JavaScript di Bootstrap, necessario per far funzionare correttamente i componenti interattivi di Bootstrap. -->
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-6 mx-auto">
                <h2 class="text-center mb-4">Form di Registrazione</h2>
                <form>
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome</label>
                        <input type="text" class="form-control" id="nome" placeholder="Inserisci il tuo nome">
                    </div>
                    <div class="mb-3">
                        <label for="cognome" class="form-label">Cognome</label>
                        <input type="text" class="form-control" id="cognome" placeholder="Inserisci il tuo cognome">
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" placeholder="Inserisci la tua email">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" placeholder="Inserisci la tua password">
                    </div>
                    <button type "submit" class("btn btn-primary")>Registrati</button>
                </form>
            </div>
        </div>
    </div>
    <script src("https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js")></script>

</body>
</html>
