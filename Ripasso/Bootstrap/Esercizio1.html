<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esercizio 1 - Navbar</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: rgb(4, 1, 10) !important; /* L'important assicura la priorità */
    }
  </style>
</head>
<body>
 <!-- nav con la classe navbar di Bootstrap, che crea una barra di navigazione responsive. La classe navbar-expand-lg indica che la navbar si espanderà su schermi di dimensioni grandi e superiori, mentre navbar-dark e bg-dark applicano uno stile scuro alla navbar. All'interno della navbar, viene utilizzato un div con la classe container-fluid per contenere il contenuto della navbar, e un elemento a con la classe navbar-brand per visualizzare il nome o il logo del sito. -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Mia Navbar</a>
    </div>
  </nav>
<!-- con questo script si collega il file JavaScript di Bootstrap, che è necessario per far funzionare correttamente i componenti interattivi di Bootstrap, come la navbar. Il file JavaScript viene caricato da un CDN (Content Delivery Network) e include tutte le funzionalità di Bootstrap necessarie per l'interattività. -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script> 
</body>
</html>
