<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Esercizio 8 - Breadcrumb</title>
</head>
<body>
  <!-- si definisce un breadcrumb utilizzando il componente breadcrumb di Bootstrap. Il breadcrumb è una navigazione secondaria che mostra la posizione dell'utente all'interno della gerarchia del sito. In questo esempio, il breadcrumb indica che l'utente si trova nella pagina "Data", che è una sottopagina di "Library", a sua volta una sottopagina di "Home". Alla fine del corpo della pagina, viene incluso uno script per caricare il file JavaScript di Bootstrap, necessario per far funzionare correttamente i componenti interattivi di Bootstrap, come il breadcrumb. -->
  <nav aria-label="breadcrumb">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="#">Home</a></li>
      <li class="breadcrumb-item"><a href="#">Library</a></li>
      <li class="breadcrumb-item active" aria-current="page">Data</li>
    </ol>
  </nav>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
