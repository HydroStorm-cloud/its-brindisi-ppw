<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Esercizio 5 - Modal</title>
</head>
<body>
    <!-- si definisce un container Bootstrap che contiene un titolo centrato e un pulsante. Il pulsante ha la classe btn btn-primary, che applica lo stile di un pulsante primario di Bootstrap, e gli attributi data-bs-toggle="modal" e data-bs-target="#myModal", che indicano che il pulsante aprirà una finestra modale con l'id "myModal" quando viene cliccato. -->
    <div class="container">
        <h2 class="text-center mb-4">Esercizio 5 - Modal</h2>
        <div class="text-center">
            <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#myModal">
                Apri Modal
            </button>  
        </div>
</body>
</html>
