<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Esercizio 6 - Tooltip e Popover</title>
</head>
<body>
    <!-- si definisce un container Bootstrap che contiene un titolo centrato e due pulsanti. Il primo pulsante ha la classe btn btn-secondary e utilizza gli attributi data-bs-toggle="tooltip" e data-bs-placement="top" per mostrare un tooltip quando l'utente passa il mouse sopra di esso. Il secondo pulsante ha la classe btn btn-info e utilizza gli attributi data-bs-toggle="popover", title e data-bs-content per mostrare un popover con un titolo e del contenuto quando viene cliccato. Alla fine del corpo della pagina, viene incluso uno script per caricare il file JavaScript di Bootstrap, necessario per far funzionare correttamente i componenti interattivi di Bootstrap, e uno script personalizzato per inizializzare i tooltip e i popover. -->
    <div class="container mt-5">
        <h2 class="text-center mb-4">Esercizio 6 - Tooltip e Popover</h2>
        <div class="text-center">
            <button type="button" class="btn btn-secondary" data-bs-toggle="tooltip" data-bs-placement="top" title="Tooltip in alto">
                Hover per Tooltip
            </button>
            <button type="button" class="btn btn-info" data-bs-toggle="popover" title="Titolo Popover" data-bs-content="Contenuto del popover.">
                Clicca per Popover
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Inizializza i tooltip
        var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
        var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
            return new bootstrap.Tooltip(tooltipTriggerEl)
        })

        // Inizializza i popover
        var popoverTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="popover"]'))
        var popoverList = popoverTriggerList.map(function (popoverTriggerEl) {
            return new bootstrap.Popover(popoverTriggerEl)
        })
    </script>
</body>
</html>
