        /* Lo switch vero e proprio */
.ios-switch {
    position: relative;
    display: inline-block;
    width: 50px;
    height: 28px;
}

/* Nascondiamo l'input di default */
.ios-switch input {
    opacity: 0;
    width: 0;
    height: 0;
}

/* Lo sfondo dello switch (OFF - Grigio) */
.slider {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: #e9e9ea;
    transition: .4s;
    border-radius: 34px;
}

/* Il "pallino" bianco */
.slider:before {
    position: absolute;
    content: "";
    height: 24px;
    width: 24px;
    left: 2px;
    bottom: 2px;
    background-color: white;
    transition: .4s;
    border-radius: 50%;
    box-shadow: 0 3px 8px rgba(0,0,0,0.15);
}

/* Colore Verde quando è su ON (tipico iOS) */
input:checked + .slider {
    background-color: #1c1f1d;
}

/* Movimento del pallino */
input:checked + .slider:before {
    transform: translateX(22px);
}

/* Quando la luce è accesa (Toggle ON) */
body.light {
    background-image: url(Gemini_Generated_Image_ky366lky366lky36.png) !important;
    background-color: #f4f4f4 !important;
    color: #1a1a1a !important;
}

/* Rendi leggibili i testi e i box in modalità luce */

body.light #bookCarousel,

body.light h1, body.light #phome, body.light .text-light {

}

/* Rendi leggibili i testi e i box in modalità luce */
body.light .tab-content, 
body.light #bookCarousel, 
body.light footer div {
    /* Sfondo bianco molto trasparente per l'effetto vetro */
    background: rgba(255, 255, 255, 0.4) !important; 
    color: #1a1a1a !important;
    border: 1px solid rgba(255, 255, 255, 0.6) !important;
    
    /* Questo crea l'effetto sfocato sotto il vetro */

    /* Ombra leggera per dare profondità */

}
