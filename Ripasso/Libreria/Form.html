    <div class="container mt-5">
    <div class="glass-form p-4"> <h2 class="text-center mb-4">Aggiungi Nuovo Libro al Catalogo</h2>
        
        <form action="salva_libro.php" method="POST" enctype="multipart/form-data">
            
            <div class="mb-3">
                <label class="form-label">Nome Libro</label>
                <input type="text" class="form-control" placeholder="Inserisci il titolo">
            </div>

            <div class="mb-3">
                <label class="form-label">Autore</label>
                <input type="text" class="form-control" placeholder="Nome dell'autore">
            </div>

            <div class="mb-3">
                <label class="form-label">Anno di Pubblicazione</label>
                <input type="number" class="form-control" min="1000" max="2026">
            </div>

            <div class="mb-3">
                <label class="form-label">Genere (Tieni premuto Ctrl per scegliere più di uno)</label>
                <select class="form-select" multiple>
                    <option value="fantasy">Fantasy</option>
                    <option value="horror">Horror</option>
                    <option value="storico">Storico</option>
                    <option value="avventura">Avventura</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Lingua originale</label>
                <select class="form-select">
                    <option selected>Scegli la lingua...</option>
                    <option value="it">Italiano</option>
                    <option value="en">Inglese</option>
                    <option value="fr">Francese</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Carica Copertina</label>
                <input type="file" class="form-control" accept="image/*">
            </div>

            <button type="submit" class="btn btn-info w-100">Aggiungi alla Libreria</button>
        </form>
    </div>
</div>
