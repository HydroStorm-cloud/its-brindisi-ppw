        /* Stile per il contenitore del Form (Effetto Vetro) */
.glass-form {
    background: rgba(0, 0, 0, 0.6); /* Nero semi-trasparente */
    backdrop-filter: blur(15px);    /* Sfocatura dello sfondo */
    border: 1px solid rgba(255, 255, 255, 0.1); /* Bordo sottile luce */
    padding: 40px;
    border-radius: 20px;
    color: white;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    margin-top: 50px;
}

/* Titolo del Form con il font Rye */
.glass-form h2 {
    font-family: 'Rye', cursive;
    color: #fff;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
}

/* Personalizzazione dei campi di input */
.form-control {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: white;
}

.form-control:focus {
    background: rgba(255, 255, 255, 0.2);
    color: white;
    border-color: #0dcaf0; /* Colore info di Bootstrap */
    box-shadow: none;
}

/* Sistemazione del pulsante (aveva un errore di sintassi) */
.btn-custom {
    background-color: #0dcaf0;
    border: none;
    font-weight: bold;
    padding: 10px 30px;
}
/* Contenitore principale della pellicola */
.film-strip-container {
    position: fixed;
    top: 0;
    width: 150px; /* Larghezza della pellicola */
    height: 100%;
    background: rgba(0, 0, 0, 0.8);
    z-index: -1; /* Sta dietro ai contenuti ma sopra il wallpaper */
    overflow: hidden;
    
}

.left-strip { left: 0; }
.right-strip { right: 0; }

/* Il nastro che si muove */
.film-track {
    display: flex;
    flex-direction: column;
    animation: scrollVertical 20s linear infinite;
}

/* Raddoppiamo l'animazione per il lato destro o cambiamo direzione se vuoi */
.right-strip .film-track {
    animation: scrollVertical 25s linear infinite reverse;
}

.film-strip-img {
    width: 100px;
    height: 150px;
    margin: 10px auto;
    object-fit: cover;
    border-radius: 4px;
    filter: sepia(0.5) contrast(1.2); /* Effetto vintage pellicola */
}

/* L'animazione che sposta il nastro verso l'alto */
@keyframes scrollVertical {
    0% { transform: translateY(0); }
    100% { transform: translateY(-50%); } /* Si sposta di metà della sua altezza totale */
}

/* Nascondi le pellicole sui cellulari per non coprire il testo */
@media (max-width: 768px) {
    .film-strip-container { display: none; }
}
