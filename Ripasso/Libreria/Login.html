/* Stile specifico per la ricerca nella navbar (sovrascrive lo stile del form) */
.navbar .form-control {
    background: white !important;
    color: #333 !important;
    border: 1px solid #ccc !important;
}

.navbar .form-control::placeholder {
    color: #888 !important;
}

/* Quando la luce è accesa, manteniamo la coerenza */
body.light .navbar .form-control {
    background: rgba(255, 255, 255, 0.8) !important;
    border: 1px solid #999 !important;
}


        /* Stile per il contenitore del Form (Effetto Vetro) */
.glass-form {
    background: rgba(0, 0, 0, 0.6); /* Nero semi-trasparente */
    backdrop-filter: blur(15px);    /* Sfocatura dello sfondo */
    border: 1px solid rgba(255, 255, 255, 0.1); /* Bordo sottile luce */
    padding: 40px;
    border-radius: 20px;
    color: white;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    margin-top: 50px;
}

/* Titolo del Form con il font Rye */
.glass-form h2 {
    font-family: 'Rye', cursive;
    color: #fff;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
}

/* Personalizzazione dei campi di input */
.form-control {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: white;
}

.form-control:focus {
    background: rgba(255, 255, 255, 0.2);
    color: white;
    border-color: #0dcaf0; /* Colore info di Bootstrap */
    box-shadow: none;
}

/* Sistemazione del pulsante (aveva un errore di sintassi) */
.btn-custom {
    background-color: #0dcaf0;
    border: none;
    font-weight: bold;
    padding: 10px 30px;
}
/* Contenitore principale della pellicola */
.film-strip-container {
    position: fixed;
    top: 0;
    width: 150px; /* Larghezza della pellicola */
    height: 100%;
    background: rgba(0, 0, 0, 0.8);
    z-index: -1; /* Sta dietro ai contenuti ma sopra il wallpaper */
    overflow: hidden;
    
}

.left-strip { left: 0; }
.right-strip { right: 0; }

/* Il nastro che si muove */
.film-track {
    display: flex;
    flex-direction: column;
    animation: scrollVertical 20s linear infinite;
}

/* Raddoppiamo l'animazione per il lato destro o cambiamo direzione se vuoi */
.right-strip .film-track {
    animation: scrollVertical 25s linear infinite reverse;
}

.film-strip-img {
    width: 100px;
    height: 150px;
    margin: 10px auto;
    object-fit: cover;
    border-radius: 4px;
    filter: sepia(0.5) contrast(1.2); /* Effetto vintage pellicola */
}

/* L'animazione che sposta il nastro verso l'alto */
@keyframes scrollVertical {
    0% { transform: translateY(0); }
    100% { transform: translateY(-50%); } /* Si sposta di metà della sua altezza totale */
}

/* Nascondi le pellicole sui cellulari per non coprire il testo */
@media (max-width: 768px) {
    .film-strip-container { display: none; }
}

 /* Lo switch vero e proprio */
.ios-switch {
    position: relative;
    display: inline-block;
    width: 50px;
    height: 28px;
}

/* Nascondiamo l'input di default */
.ios-switch input {
    opacity: 0;
    width: 0;
    height: 0;
}

/* Lo sfondo dello switch (OFF - Grigio) */
.slider {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: #e9e9ea;
    transition: .4s;
    border-radius: 34px;
}

/* Il "pallino" bianco */
.slider:before {
    position: absolute;
    content: "";
    height: 24px;
    width: 24px;
    left: 2px;
    bottom: 2px;
    background-color: white;
    transition: .4s;
    border-radius: 50%;
    box-shadow: 0 3px 8px rgba(0,0,0,0.15);
}

/* Colore Verde quando è su ON (tipico iOS) */
input:checked + .slider {
    background-color: #1c1f1d;
}

/* Movimento del pallino */
input:checked + .slider:before {
    transform: translateX(22px);
}

/* Quando la luce è accesa (Toggle ON) */
body.light {

/* Rendi leggibili i testi e i box in modalità luce */
