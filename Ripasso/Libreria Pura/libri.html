 <div class="offcanvas offcanvas-start" id="aggiungiLibro">
  <div class="offcanvas-header">

  <div class="offcanvas-body">
    <div class="container mt-3">
  <form action="/action_page.php">
    <div class="mb-3 mt-3">
      <label for="libri">Inserisci il nome del libro:</label>
      <input type="text" id="libri" name="libri" class="form-control" placeholder="Cime Tempestose"/>
    </div>
    <div class="mb-3">
      <label for="autore">Inserisci il nome dell'autore:</label>
      <input type="text" id="autore" name="autore" class="form-control" placeholder="Emily Brontè"/>
    </div>
    <div class="mb-3">
      <label for="anno">Inserisci il prezzo:</label>
      <input type="number"id="prezzo" name="prezzo" class="form-control" placeholder="20€" />
     </div>
     <div class="mb-3">
    <label for="genere">Inserisci il genere del libro:</label>
    <select name="genere" id="genere" multiple class="form-control">
        <option value="horror">horror</option>
        <option value="avventura">avventura</option>
    </select>
    </div>
      <div class="mb-3">
    <label for="lingua">Inserisci la lingua del libro:
    <select name="lingua" id="lingua" class="form-control">
        <option value="Italiano">italiano</option>
        <option value="Inglese">inglese</option>
    </select>
    </div>
    <div class="mb-3">
      <label for="myfile">Inserisci i file del libro:</label>
      <input type="file" id="myfile" name="myfile" class="form-control">
     </div>
    
  </form>
</div>
