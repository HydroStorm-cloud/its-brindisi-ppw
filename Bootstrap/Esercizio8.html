<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esercizio 8 — Breadcrumb</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    ul.breadcrumb{
        padding: 10px;
        list-style: none;
        background-color: blueviolet;
    }
    ul.breadcrumb li {
        display: inline;
        font-size: 18px;
    }
  </style>
</head>
<body>
    <ul class="breadcrumb">
        <li><a href="Casa">Casa</a></li>
        <li><a href="Parcheggio">Parcheggio</a></li>
        <li><a href="Macchina">Macchina</a></li>
        <li><a href="Ospedale">Ospedale</a></li>
        <li>Aldilà</li>
    </ul>
</body>
</html>
