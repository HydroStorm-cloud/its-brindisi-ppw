<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esercizio 5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <h1>Esercizio 5</h1>
    <p>Strutturate header, body e footer Collegate il pulsante con data-bs-target Testate l'apertura e la chiusura</p>
    <div class="container mt-3">
        <button type="button" class="btn btn-dark" data-bs-toggle="modal" data-bs-target="#ciao">NON CLICCARE</button>
    </div>
    <div class="modal" id="ciao">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    TI HO DETTO DI NON CLICCAREEEEEE!
                </div>
                <div class="model-footer mb-3 ms-3">
                    <button type="button" class="btn btn-danger" data-bs-dismiss="modal">CHIUDI CHE FA FREDDO</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
