<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <h1>Esercizio 3</h1>
    <p>Form di Registrazione Elegante Applicate form-control a tutti i campi Usate mb-3 per spaziare i gruppi Aggiungete form-label alle etichette</p>
    <div class="container mt-3">
        <form action="/action">
            <div class="mb-3 mt-3">
                <label for="email">Inserisci l'email:</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="marco..@gmail.com">
            </div>
            <div class="mb-3">
                <label for="pwd">Inserisci la password:</label>
                <input type="password" class="form-control" id="psw" name="pswd" placeholder="1234">
            </div>
            <div class="form-check mb-3">
                <label class="form-check-label">
                    <input class="form-check-input" type="checkbox" name="ricorda">Ricorda
                </label>
            </div>
            <button type="submit" class="btn btn-dark">Log in</button>
        </form>

    </div>
</body>
</html>
